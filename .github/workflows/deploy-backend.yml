name: Deploy Backend — O2switch

# Déclenché manuellement ou après CI sur main
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Backend CI/CD"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to O2switch
    runs-on: ubuntu-latest
    # Ne déploie que si le CI a réussi (ou si déclenché manuellement)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Get runner public IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Whitelist runner IP on O2switch
        env:
          ENDPOINT: "frontend/o2switch/o2switch-ssh-whitelist/index.live.php"
          BASE_URL: "https://${{ secrets.O2SWITCH_SSH_USERNAME }}:${{ secrets.CPANEL_PASSWORD_ENCODED }}@${{ secrets.O2SWITCH_SSH_HOST }}:2083"
        run: |
          echo "==> Suppression des anciennes IPs GitHub whitelistées..."
          UNIQUE_IPS=$(curl -sX GET "$BASE_URL/$ENDPOINT?r=list" | jq -r '.data.list[] | .address' | sort -u)
          for address in $UNIQUE_IPS; do
            echo "Suppression: $address"
            curl -sX GET "$BASE_URL/$ENDPOINT?r=remove&address=$address&direction=in&port=22"
            sleep 3
            curl -sX GET "$BASE_URL/$ENDPOINT?r=remove&address=$address&direction=out&port=22"
            sleep 3
          done

          echo "==> Ajout de l'IP du runner: ${{ steps.ip.outputs.ipv4 }}"
          curl -sX POST \
            -d "whitelist[address]=${{ steps.ip.outputs.ipv4 }}" \
            -d "whitelist[port]=22" \
            "$BASE_URL/$ENDPOINT?r=add"

      - name: Wait for firewall propagation (O2switch ~65s)
        run: sleep 65

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.O2SWITCH_SSH_HOST }}
          username: ${{ secrets.O2SWITCH_SSH_USERNAME }}
          key: ${{ secrets.O2SWITCH_SSH_PRIVATE_KEY }}
          port: ${{ secrets.O2SWITCH_SSH_PORT || 22 }}
          script: |
            set -e

            echo "==> Déploiement backend saFoulee sur O2switch"
            cd ${{ secrets.O2SWITCH_DEPLOY_PATH }}

            echo "==> Récupération du code (branche main)"
            git fetch origin main
            git checkout main
            git pull origin main

            echo "==> Installation des dépendances PHP (production)"
            php $(which composer) install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --no-ansi

            echo "==> Mise en maintenance"
            php artisan down --retry=60 --render="errors::503" || true

            echo "==> Migrations base de données"
            php artisan migrate --force

            echo "==> Mise en cache de la configuration"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "==> Redémarrage de la queue"
            php artisan queue:restart

            echo "==> Retour en ligne"
            php artisan up

            echo "==> Déploiement terminé avec succès"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.O2SWITCH_SSH_HOST }}
          username: ${{ secrets.O2SWITCH_SSH_USERNAME }}
          key: ${{ secrets.O2SWITCH_SSH_PRIVATE_KEY }}
          port: ${{ secrets.O2SWITCH_SSH_PORT || 22 }}
          script: |
            # Vérification que l'API répond
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.API_DOMAIN }}/up" \
              --max-time 10)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERREUR : /up a répondu HTTP $HTTP_CODE"
              exit 1
            fi
            echo "==> Health check OK (HTTP $HTTP_CODE)"
