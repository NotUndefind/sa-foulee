name: Backend CI/CD

on:
  push:
    branches: [main, dev]
    paths: ['backend/**']
  pull_request:
    branches: [main, dev]
    paths: ['backend/**']

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: safoulee_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Format check (Laravel Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --memory-limit=512M

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: safoulee_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run tests (Pest)
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: safoulee_test
          DB_USERNAME: root
          DB_PASSWORD: password

  # Le déploiement est géré par .github/workflows/deploy-backend.yml
  # (déclenché automatiquement après succès de ce workflow sur main)
